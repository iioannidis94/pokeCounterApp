<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Ultimate Hub</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
<style>
  :root {
    --bg: #121212;
    --card-bg: #1e1e1e;
    --text: #ffffff;
    --dim: #aaaaaa;
    --primary: #3b82f6;
    --secondary: #8b5cf6;
    --danger: #ef4444;
    --success: #10b981;
    --border: #333333;
  }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
  }
  
  /* Navbar */
  nav {
    background: var(--card-bg);
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  nav button {
    background: transparent;
    color: var(--dim);
    border: 1px solid transparent;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    transition: 0.2s;
  }
  nav button:hover { color: var(--text); background: rgba(255,255,255,0.1); }
  nav button.active { color: var(--text); border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }

  .view { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
  .view.active { display: block; }

  h1, h2 { text-align: center; margin-bottom: 30px; }

  /* Home View */
  .home-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
  }
  .big-btn {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 16px;
    width: 300px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
  }
  .big-btn:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
  .big-btn h2 { margin: 0 0 15px 0; color: var(--primary); }
  .big-btn.purple h2 { color: var(--secondary); }
  .big-btn.purple:hover { border-color: var(--secondary); }
  .big-btn p { color: var(--dim); margin: 0; }

  /* Search Component */
  .search-container { max-width: 600px; margin: 0 auto 30px; position: relative; }
  input[type="text"] {
    width: 100%; padding: 15px; font-size: 16px;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; box-sizing: border-box;
  }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--card-bg); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 8px 8px;
    max-height: 300px; overflow-y: auto; z-index: 10; display: none;
  }
  .search-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
  .search-item:last-child { border-bottom: none; }
  .search-item img { width: 50px; height: 50px; margin-right: 15px; }
  .search-item span { flex-grow: 1; text-transform: capitalize; font-weight: bold; }
  
  .btn-add { background: var(--success); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .btn-add:hover { opacity: 0.9; }

  /* Counters View */
  #countersResult {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; max-width: 600px; margin: 0 auto; text-align: center;
    display: none;
  }
  .types-badges span {
    display: inline-block; padding: 5px 10px; margin: 0 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; font-size: 12px; border: 1px solid rgba(255,255,255,0.3);
  }
  .weakness-row { display: flex; align-items: center; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; text-align: left; }
  .w-label { width: 80px; font-weight: bold; font-size: 14px; }
  .w-types { flex-grow: 1; display: flex; flex-wrap: wrap; gap: 5px; }
  .w-types span { font-size: 12px; padding: 3px 8px; border-radius: 4px; background: #333; }

  /* Team Builder View */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  .poke-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
  .poke-header { display: flex; align-items: center; margin-bottom: 15px; }
  .poke-header img { width: 80px; height: 80px; }
  .poke-info { flex-grow: 1; margin-left: 10px; }
  .poke-info h3 { margin: 0 0 5px 0; text-transform: capitalize; }
  .level-input { width: 50px; background: #000; color: #fff; border: 1px solid var(--border); padding: 4px; text-align: center; border-radius: 4px; }
  
  .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stats-table th, .stats-table td { text-align: center; padding: 4px 2px; }
  .stats-table th { color: var(--dim); font-weight: normal; }
  .stats-table td.stat-name { text-align: left; font-weight: bold; }
  .stats-table input { width: 45px; background: #000; color: #fff; border: 1px solid var(--border); padding: 4px; text-align: center; border-radius: 4px; }
  .final-stat { font-weight: bold; color: var(--primary); font-size: 15px; }
  .remove-btn { background: var(--danger); color: white; border: none; width: 100%; padding: 8px; margin-top: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

</style>
</head>
<body>

<nav id="navbar">
  <button onclick="switchView('home')"
