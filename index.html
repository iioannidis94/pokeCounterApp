    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">POKÉ<span>DEX</span></div>
  <div class="sw">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Search: name, #number, type…" autocomplete="off" spellcheck="false">
  </div>
  <button class="teamBtn" id="myTeamBtn" type="button">Team Builder</button>
  <button class="teamBtn dexBtn" id="dexViewBtn" type="button">Weaknesses / Counters</button>
</header>

<div class="tfs" id="tf"></div>
<div class="sb"><span id="cnt">Loading...</span></div>
<main><div id="grid"></div></main>

<div class="teamOverlay" id="teamOverlay" aria-hidden="true">
  <section class="teamPanel" role="dialog" aria-modal="true" aria-labelledby="teamTitle">
    <div class="teamTop">
      <h2 class="teamTitle" id="teamTitle">TEAM BUILDER</h2>
      
      <select id="teamSelect" class="teamTool" style="margin: 0 10px; padding: 6px; cursor: pointer;"></select>
      <button id="addTeamBtn" class="teamTool" type="button">+ New Team</button>
      <button id="renameTeamBtn" class="teamTool" type="button" style="margin-right: auto;">Rename</button>
      
      <button class="teamTool" id="autoTeamBtn" type="button" style="border-color: #38d878; color: #38d878; background: rgba(56,216,120,0.1);">✨ Auto-Build 6</button>
      <button class="teamTool" id="teamExport" type="button">Export JSON</button>
      <label class="teamTool importTool" for="teamImport">Import JSON</label>
      <input id="teamImport" type="file" accept="application/json,.json" hidden>
      <button class="teamReset" id="teamReset" type="button">Clear Team</button>
      <button class="teamClose" id="teamClose" type="button">Close</button>
    </div> 
    <div class="teamBody">
        <aside class="teamPicker">
            <input class="teamSearch" id="teamSearch" type="text" placeholder="Search Pokémon to add..." autocomplete="off" spellcheck="false">
            <div class="teamList" id="teamList"></div>
        </aside>
        <section class="teamSlots" id="teamSlots"></section>
    </div>
  </section>
</div>

<script src="data.js" defer></script>
<script src="dex.js" defer></script>
<script src="team.js" defer></script>
</body>
</html>
